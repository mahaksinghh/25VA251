<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Poppins", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e1b4b
    );
}

.container {
    width: 400px;
    padding: 35px;

    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(15px);

    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;

    text-align: center;
    color: white;

    box-shadow:
        0 0 20px rgba(99, 102, 241, 0.3),
        0 0 40px rgba(139, 92, 246, 0.2);
}

.container h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: #e2e8f0;

    text-shadow: 0 0 15px rgba(99, 102, 241, 0.7);
}

input {
    width: 100%;
    padding: 14px;

    border: 2px solid #334155;
    border-radius: 12px;

    background: #0f172a;
    color: white;
    font-size: 16px;

    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #6366f1;

    box-shadow:
        0 0 10px #6366f1,
        0 0 20px rgba(99, 102, 241, 0.4);
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 14px;

    border: none;
    border-radius: 12px;

    background: linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color: white;
    font-size: 16px;
    font-weight: 600;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);

    box-shadow:
        0 0 15px #6366f1,
        0 0 30px #8b5cf6;
}

#result {
    margin-top: 25px;
    padding: 12px;

    border-radius: 12px;

    background: rgba(15, 23, 42, 0.7);

    color: #22c55e;
    font-size: 22px;
    font-weight: bold;

    letter-spacing: 1px;
}
    </style>
</head>
<body>

    <div class="container">
        <h2>Even or Odd Checker</h2>

        <input type="number" id="number" placeholder="Enter a number">

        <br>

        <button onclick="checkNumber()">Check</button>

        <div id="result"></div>
    </div>

    <script>
        function checkNumber() {
            let num = document.getElementById("number").value;
            let result = document.getElementById("result");

            if (num === "") {
                result.innerHTML = "Please enter a number!";
                return;
            }

            if (num % 2 === 0) {
                result.innerHTML = num + " is Even";
            } else {
                result.innerHTML = num + " is Odd";
            }
        }
    </script>

</body>
</html>
