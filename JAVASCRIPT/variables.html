<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var Data Value Types in JS</title>
</head>
<body>
    <script>
     //JS Data Value Types in JS
     //Primitive data types- single value variables which are immutable (cannot be changed) and stored in stack memory
     //String, Number, Boolean, Null, Undefined, Symbol

     var myName="Mahak Singh"; //String data type
     console.log(myName);
     console.log(typeof (myName)); //to check the data type of variable

     //number
     var myMob= 56789;
     console.log(myName+ " mobile number is "+myMob);

     //boolean
     var isMarried= false;
        console.log(myName+ " is married? "+isMarried);

    //undefined
    var myEmail;
    console.log(myEmail); //undefined because we have not assigned any value to variable
    console.log(typeof(myEmail)); //undefined

    //BigInt
    var myVal= BigInt(12356789045343544523125664567890); //to store large integers
    console.log(myVal);
    console.log(typeof(myVal));

    //Symbol
     var name1= "Rohan"; //to create unique identifiers
    var name2= "Rohan";
    console.log(name1==name2); //true because both variables have same identities

    var name1= Symbol("Rohan"); //to create unique identifiers
    var name2= Symbol("Rohan");
    console.log(name1==name2); //false because both variables have different identities

    //Reference(object) typed==mutable in memory and keep values in pair
    //object,function ,array

    //objects are defined in pair of key and its value.

    let myInfo={
        name:"Mahak Singh",
        age: 20,
        isMarried: false,
        mob:8630123753,
        add:null,
        branch:"CSE",
        section:"15",
    };
    console.log(myInfo);
    console.log(typeof(myInfo)); //access object's key i.e. name

    let keys= Object.keys(myInfo);
    console.log("My info object length is "+ keys.length);

    //function- block of code that performs a specific task 
function cal(){
    var num1=10;
    var num2=20;
    var res=num1+num2;
    console.log("Addition of two numbers is "+ res);
    console.log(typeof(cal)); //function is also an object in JS
}
cal();

//array- collection of any datatypes in JS 
//for similar data types 
let studentList=["Mahek","Mahak","Kunal","Lakshay","Aditya"];
console.log(studentList[1]);

//for any dataypes
let mahekInfo=["Mahek Singh",20,false,null,"CSE",15];
console.log(mahekInfo[1]);
console.log(typeof(mahekInfo));

//to iterate array member
for (let i=0;i<mahekInfo.length;i++){
    console.log(mahekInfo[i]);
}
    </script>
    
</body>
</html>
