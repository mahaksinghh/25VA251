<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions in JS</title>
</head>
<body>
    <script>
//Functions are reusable blocks of code in JavaScript that perform specific tasks.
        
        
        //normal function without parameter
        function demo(){
            console.log("Hello World");
        }
        demo();

        //function with parameter
        function demo1(text){
            console.log("Hello "+text);
        }
        demo1("React");

        //function with default parameter
        function add(a,b=22){
            var num1 = a;
            var num2 = b;
            var res = num1+num2;
            console.log("Addition of two numbers is "+res);
        }
        add(34);

        //SYNCHRONOUS AND ASYNCHRONOUS

        //Synchronous code runs sequentially, line by line. Each task must finish before the next one starts, which is known as blocking. 
        //Asynchronous code allows the program to start a long-running task (like a network request) and continue executing other code while waiting for that task to finish. This is non-blocking.

        function cal(){

            function add(a,b){
                console.log("addtion is "+(a+b));
            }

            function sub(x,y){
                console.log("subtraction is "+(x-y));
            }

            function mul(p,q){
                console.log("multiplication is "+(p*q));
            }
            mul(3,5);
            sub(12,2);
            add(3,5);
        }
        cal();

    //Anonymous Functions- An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. 

    let msg = function(){
        console.log("Hello ABES");
    }
    msg();
    //short code for above function i.e. arrow function
    let msg1=()=>console.log("Hello React");
    msg1();

    //arrow function with multiple lines
    let msg2=(age)=>{
    if (age>=18){
        console.log("valid age");
    }
    }
    msg2(23);

    //call back function-a function passed as an argument to another function, which is then invoked (or "called back") at a later point in time to complete a specific task.
    function blue(a,b,callback){
        var num1=a;
        console.log("First number is "+num1);
        var num2=b;
        console.log("Second number is "+num2);
        var res=num1+num2;
        callback(res);
    }
    function display(res){
        console.log("Result is "+res);
    }
    blue(3,4,display);

    //callback using setTimeout API

    function greeting(){
        console.log("Hello Students");
    }
    function loading(){
        document.writeln("Data Loading.....");
    }
    loading();
    setTimeout(greeting,2000);

    //callback hell....

    //Javascript Promises-Promises are used to handle asynchronous code more cleanly than traditional callbacks (often referred to as "callback hell"), enabling method chaining and better error management.
        //Promises Stages...
    //pending - operation started (not finished)
    //rejected - operation failed
    //fulfilled - operation completed
    let promise = new Promise(function(resolve,reject){
        let myAge = 23;
        if (myAge>=18){
            resolve("valid age");
        }
        else{
            reject("wait for next year")
        }
    }
);
promise.then(result=>console.log(result)).catch(error=>console.log(error));

//async and await are modern JavaScript keywords that provide a cleaner, more readable syntax for working with Promises.
//They allow asynchronous code to be written in a style that looks and behaves like synchronous code, making complex asynchronous flows easier to manage than traditional .then() chains or callbacks.

//fetch api
async function userData(){
    let userResponse = await fetch('https://fakestoreapi.com/products/1');
    let userDataRes = await userResponse.json();
    console.log(userDataRes);
}
userData();

//async await using try catch

async function productDetail(){
   try{
    let proRes = await fetch('https://fakestoreapi.com/products/1');
    let proResData = await proRes.json();
    console.log(proResData);
}
catch(error){
    console.log("not valid data "+ error);
}
}
productDetail();

//IIFE:- s a JavaScript function that runs as soon as it is defined. 
(function(){
    console.log("HELLO IIFE");
})();
    //short code for above function
    (msg=>console.log("IIFE"))();
    console.log(typeof(msg));

 //Local storage:- allows developers to store persistent data as key-value pairs within a user's browser.

 let myInfo={
    name: "Mahak",
    age: 19,
    address: "Ghaziabad",
    email: "mahak@gmail.com",
    mob: 4569873,
 };
 //convert object into JSON string
 let myInfoData=JSON.stringify(myInfo);

 //set the data
 localStorage.setItem('preferences',myInfoData);

//get data (retrieve data)
 let myPreference=localStorage.getItem('preferences');

//convert into JSON object
let myInfoPre=JSON.parse(myPreference);

//access keys
console.log(myInfoPre.name);

//High order functions

//map() creates a new array by applying a provided function to every element in the original array, which remains unchanged.

let num=[5,8,6,3,2,9,7,4,3];
let result=num.map(n=>n*2);
console.log(result);

//reduce(): Accumulates the array elements into a single value.

let sum=num.reduce((total,n)=>total+n);
console.log(sum); //47

//filter (best for sorting)
let sorting=num.filter(n=>n>3);
console.log(sorting);

//forEach(): Executes a provided function once for each array element, typically for performing side effects (like logging to the console). It does not return a new array.
num.forEach((n)=>console.log(n*n));
console.log(`Updated array is ${num}`);
    
    </script>
</body>
</html>
